<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - DeepGuard AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .nav-link {
            position: relative;
            transition: all 0.3s;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: white;
            transition: width 0.3s;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .result-card {
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="gradient-bg">
    <div class="container mx-auto px-4 py-8">
        <!-- Navbar -->
        <nav class="flex justify-between items-center mb-16 text-white">
            <div class="flex items-center space-x-2" onclick="window.location='/'">
                <i class="fas fa-shield-alt text-3xl"></i>
                <span class="text-2xl font-bold">DeepGuard AI</span>
            </div>
            <div class="space-x-8">
                <a href="/" class="nav-link">Home</a>
                <a href="/about" class="nav-link">About</a>
                <a href="/documentation" class="nav-link">Docs</a>
                <a href="/settings" class="nav-link">Settings</a>
                <a href="/analysis" class="nav-link">Analysis</a>
                
            </div>
        </nav>

        <!-- Result Card -->
        <div class="max-w-2xl mx-auto result-card">
            <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">
                {% if is_deepfake %}
                <div class="w-24 h-24 mx-auto bg-red-100 rounded-full flex items-center justify-center mb-6">
                    <i class="fas fa-exclamation-triangle text-5xl text-red-600"></i>
                </div>
                <h1 class="text-4xl font-bold text-red-600 mb-4">FAKE</h1>
                {% else %}
                <div class="w-24 h-24 mx-auto bg-green-100 rounded-full flex items-center justify-center mb-6">
                    <i class="fas fa-check-circle text-5xl text-green-600"></i>
                </div>
                <h1 class="text-4xl font-bold text-green-600 mb-4">REAL</h1>
                {% endif %}

                <!-- Confidence Bar -->
                <div class="mb-6">
                    <p class="text-gray-600 mb-2">Confidence: <span class="font-bold">{{ confidence }}%</span></p>
                    <div class="w-full bg-gray-200 rounded-full h-4">
                        <div class="{% if is_deepfake %}bg-red-600{% else %}bg-green-600{% endif %} h-4 rounded-full transition-all duration-1000"
                             style="width: 0%" id="confidenceBar"></div>
                    </div>
                </div>

                <!-- Details -->
                <div class="bg-gray-50 rounded-xl p-4 mb-6 text-left">
                    <p class="text-sm text-gray-500 mb-1">Filename</p>
                    <p class="text-gray-700 font-mono text-sm mb-3">{{ filename }}</p>
                    
                    <p class="text-sm text-gray-500 mb-1">Raw Probability (fake)</p>
                    <p class="text-gray-700 font-mono">{{ probability }}</p>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-4">
                    <a href="/" 
                       class="bg-gray-600 text-white py-3 px-6 rounded-xl hover:bg-gray-700 transition text-center">
                        <i class="fas fa-upload mr-2"></i>
                        New Video
                    </a>
                    <button onclick="window.print()" 
                            class="bg-purple-600 text-white py-3 px-6 rounded-xl hover:bg-purple-700 transition">
                        <i class="fas fa-print mr-2"></i>
                        Print Result
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center text-purple-200 mt-12 text-sm">
            <p>© 2024 DeepGuard AI • Final Year B.Tech Project</p>
        </footer>
    </div>

    <script>
        // Animate confidence bar on load
        window.addEventListener('load', () => {
            const bar = document.getElementById('confidenceBar');
            bar.style.width = '{{ confidence }}%';
        });
    </script>
</body>
</html>
